name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5 # Upgraded to v5 to fix Node warning

    - name: Set up JDK 17
      uses: actions/setup-java@v5 # Upgraded to v5 to fix Node warning
      with:
        distribution: 'zulu'
        java-version: '17'

    # This creates the necessary build environment if your repo is missing it
    - name: Validate or Generate Gradle Wrapper
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "Generating missing Gradle wrapper..."
          gradle wrapper --gradle-version 8.5
        fi

    - name: Grant Execute Permissions for Gradle
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace # Stacktrace gives clear logs if it fails

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacroCamera-APK
        path: app/build/outputs/apk/debug/app-debug.apk